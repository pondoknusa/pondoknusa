<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="#0f0f1a"/>

  <!-- T -->
  <g fill="url(#grad)">
    <rect x="90" y="110" width="140" height="26" rx="5"/>
    <rect x="147" y="110" width="26" height="160" rx="5"/>
  </g>

  <!-- y -->
  <g fill="none" stroke="url(#grad)" stroke-width="26" stroke-linecap="round">
    <!-- V-shape upper body -->
    <path d="M 230 135 L 275 190 L 320 135"/>
    <!-- tail descender -->
    <path d="M 275 190 L 250 280"/>
  </g>
</svg>
