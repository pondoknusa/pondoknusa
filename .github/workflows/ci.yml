name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [26]

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Singleton peer policy
        run: npm run check:singleton-peers

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Singleton peer fixture install
        run: npm run check:singleton-peers:fixture

      - name: Test
        run: npm test

      - name: Build docs
        run: npm run docs:build
